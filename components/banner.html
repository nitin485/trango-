<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trango Detergents</title>

<style>
    .banner-container {
        position: relative;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        overflow: hidden;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }
    
    .banner-image {
        width: 100%;
        height: auto;
        display: block;
        max-height: 500px; /* Default max height for desktop */
        object-fit: cover;
        /* background: linear-gradient(135deg, #e0f7fa 0%, #80deea 50%, #4fc3f7 100%); */
    }
    
    .banner-content {
        position: absolute;
        top: 50%;
        left: 5%;
        transform: translateY(-50%);
        max-width: 50%;
        color: #333;
        padding: 20px;
        background-color: rgba(255, 255, 255, 0.85);
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    
    .banner-heading {
        font-size: 2.5rem;
        margin-bottom: 10px;
        color: #0277bd;
        font-weight: 700;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
    }
    
    .banner-text {
        font-size: 1.1rem;
        margin-bottom: 20px;
        line-height: 1.5;
        color: #333;
    }
    
    .shop-now-btn {
        display: inline-block;
        padding: 12px 30px;
        background-color: #0288d1;
        color: white;
        text-decoration: none;
        border-radius: 30px;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.3s ease;
        border: 2px solid #0288d1;
        box-shadow: 0 4px 8px rgba(2, 136, 209, 0.3);
    }
    
    .shop-now-btn:hover {
        background-color: #0277bd;
        transform: translateY(-3px);
        box-shadow: 0 6px 12px rgba(2, 136, 209, 0.4);
        border-color: #0277bd;
    }
    
    .shop-now-btn:active {
        transform: translateY(-1px);
    }
    
    /* Tablet Responsive */
    @media (max-width: 768px) {
        .banner-image {
            max-height: 400px; /* Reduced height for tablets */
        }
        
        .banner-content {
            max-width: 80%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .banner-heading {
            font-size: 2rem;
        }
        
        .banner-text {
            font-size: 1rem;
        }
    }
    
    /* Mobile Responsive */
    @media (max-width: 480px) {
        .banner-image {
            margin-top: 16px;
            max-height: 300px; /* Further reduced for mobile */
            min-height: 250px; /* Minimum height guarantee */
            object-fit: contain;
        }
        
        .banner-content {
            padding: 15px;
            max-width: 90%;
        }
        
        .banner-heading {
            font-size: 1.5rem;
        }
        
        .banner-text {
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .shop-now-btn {
            padding: 10px 20px;
            font-size: 0.9rem;
        }
    }
</style>



</head>
<body>
    <div class="banner-container">
        <!-- Replace with your actual image path -->
        <img src="https://ik.imagekit.io/0v38qxk7k/assets/
trango assets/banner-sm.jpeg" alt="Fresh laundry with detergent" class="banner-image">

            <a href="#" class="shop-now-btn">Shop Now</a>
        </div>
         -->
    </div>
</body>
</html>
